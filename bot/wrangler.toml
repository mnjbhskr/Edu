name = "mathsedu-marketing-bot"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# Scheduled triggers — the bot runs autonomously on these schedules
[triggers]
crons = [
  "0 9 * * 1-5",     # Weekdays 9am UTC — daily content generation
  "0 14 * * 2,4",    # Tue/Thu 2pm UTC — post to social platforms
  "0 10 * * SUN",    # Sunday 10am UTC — weekly analytics review & strategy adjustment
]

# KV namespaces for persistent state
[[kv_namespaces]]
binding = "CONTENT_KV"
id = "6f1b56ff91f144ffb25c7f5161ec4677"

[[kv_namespaces]]
binding = "ANALYTICS_KV"
id = "8bdee25d8727479a8b18b6f95cd86cd9"

# Environment variables (set via wrangler secret put)
# ANTHROPIC_API_KEY   — Claude API key
# TWITTER_BEARER      — X/Twitter API bearer token
# TWITTER_API_KEY     — X/Twitter API key
# TWITTER_API_SECRET  — X/Twitter API secret
# TWITTER_ACCESS_TOKEN — X/Twitter access token
# TWITTER_ACCESS_SECRET — X/Twitter access token secret
# LINKEDIN_ACCESS_TOKEN — LinkedIn access token
# REDDIT_CLIENT_ID    — Reddit app client ID
# REDDIT_CLIENT_SECRET — Reddit app secret
# REDDIT_USERNAME     — Reddit username
# REDDIT_PASSWORD     — Reddit password
# NOTIFY_EMAIL        — Email for weekly reports
