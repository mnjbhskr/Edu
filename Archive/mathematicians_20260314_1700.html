    <script>
        /* ── Constellation canvas ── */
        (function() {
            const canvas = document.getElementById('constellation-canvas');
            const ctx = canvas.getContext('2d');
            let dpr = 1, W = 0, H = 0, stars = [], connections = [];
            const ERA_COLOURS = {
                ancient: '#fbbf24', medieval: '#fb923c', renaissance: '#f87171',
                enlightenment: '#60a5fa', nineteenth: '#818cf8', modern: '#22d3ee',
                contemporary: '#10b981'
            };
            const ERA_ORDER = ['ancient','medieval','renaissance','enlightenment','nineteenth','modern','contemporary'];

            function resize() {
                dpr = window.devicePixelRatio || 1;
                W = canvas.clientWidth; H = canvas.clientHeight;
                canvas.width = W * dpr; canvas.height = H * dpr;
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }
            let _lastData = null;
            window.addEventListener('resize', () => {
                resize();
                if (_lastData) buildConstellation(_lastData);
            });
            resize();

            function buildConstellation(mathematicians) {
                _lastData = mathematicians;
                stars = []; connections = [];
                if (!mathematicians || mathematicians.length === 0) return;

                const pad = 40;
                const usable = W - pad * 2;
                const sorted = [...mathematicians].sort((a, b) => a.birthYear - b.birthYear);
                const minY = sorted[0].birthYear, maxY = sorted[sorted.length - 1].birthYear;
                const range = maxY - minY || 1;

                sorted.forEach((m, i) => {
                    const xFrac = (m.birthYear - minY) / range;
                    const x = pad + xFrac * usable;
                    // Spread vertically with deterministic hash
                    let hash = 0;
                    for (let c = 0; c < m.name.length; c++) hash = ((hash << 5) - hash + m.name.charCodeAt(c)) | 0;
                    const yOff = (Math.abs(hash) % 1000) / 1000;
                    const y = 30 + yOff * (H - 60);
                    const colour = ERA_COLOURS[m.era] || '#60a5fa';
                    const radius = 1.5 + Math.min(m.connections?.length || 0, 5) * 0.4;
                    stars.push({ x, y, baseRadius: radius, radius, colour, phase: Math.random() * Math.PI * 2, speed: 0.3 + Math.random() * 0.7, id: m.id, name: m.name });
                });

                // Build connection lines from influence data
                const idMap = {};
                stars.forEach((s, i) => idMap[s.id] = i);
                sorted.forEach(m => {
                    if (!m.connections) return;
                    const fromIdx = idMap[m.id];
                    m.connections.forEach(cid => {
                        const toIdx = idMap[cid];
                        if (toIdx !== undefined && fromIdx < toIdx) {
                            connections.push({ from: fromIdx, to: toIdx });
                        }
                    });
                });
            }

            let t = 0;
            function draw() {
                t += 0.016;
                ctx.clearRect(0, 0, W, H);

                // Draw connection lines
                connections.forEach(c => {
                    const a = stars[c.from], b = stars[c.to];
                    const alpha = 0.06 + 0.03 * Math.sin(t * 0.5 + c.from);
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = `rgba(96,165,250,${alpha})`;
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                });

                // Draw stars with twinkling
                stars.forEach(s => {
                    const twinkle = 0.5 + 0.5 * Math.sin(t * s.speed + s.phase);
                    const r = s.baseRadius * (0.7 + 0.6 * twinkle);
                    const alpha = 0.4 + 0.6 * twinkle;

                    // Glow
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r * 3, 0, Math.PI * 2);
                    ctx.fillStyle = s.colour.replace(')', `,${alpha * 0.15})`).replace('rgb', 'rgba').replace('#', '');
                    // Use hex to rgba
                    const glowAlpha = alpha * 0.12;
                    ctx.fillStyle = `${s.colour}${Math.round(glowAlpha * 255).toString(16).padStart(2, '0')}`;
                    ctx.fill();

                    // Core
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, r, 0, Math.PI * 2);
                    ctx.fillStyle = s.colour;
                    ctx.globalAlpha = alpha;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });

                requestAnimationFrame(draw);
            }
            requestAnimationFrame(draw);

            // Expose for use after data loads
            window._constellationBuild = buildConstellation;
        })();

        /* ── Card entrance observer ── */
        const cardObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const card = entry.target;
                    const delay = parseInt(card.dataset.stagger || '0', 10);
                    setTimeout(() => card.classList.add('card-visible'), delay);
                    cardObserver.unobserve(card);
                }
            });
        }, { threshold: 0.05, rootMargin: '0px 0px -30px 0px' });

        function observeCards() {
            document.querySelectorAll('.card:not(.card-visible)').forEach((card, i) => {
                card.dataset.stagger = String(Math.min(i * 50, 600));
                cardObserver.observe(card);
            });
        }
    </script>
    <script>

        };

        let allMathematicians = [];
        let filteredMathematicians = [];
        let currentView = 'grid';
        let expandedCardId = null;
        const loadingEl = document.getElementById('loading');
        const gridViewEl = document.getElementById('grid-view');
        const timelineViewEl = document.getElementById('timeline-view');
        const groupViewEl = document.getElementById('group-view');
        const noResultsEl = document.getElementById('no-results');
        const searchInput = document.getElementById('search-input');
        const eraFilter = document.getElementById('filter-era');
        const fieldFilter = document.getElementById('filter-field');

        async function loadMathematicians() {
            loadingEl.style.display = 'block';
            try {
                const response = await fetch('data/mathematicians.json');
                if (!response.ok) throw new Error('Failed to load data');
                const rawData = await response.text();
                let parsedData;
                try {
                    parsedData = JSON.parse(rawData);
                } catch(e) {
                    // If JSON is broken, extract valid array portion
                    let depth = 0, endPos = -1;
                    for (let i = 0; i < rawData.length; i++) {
                        if (rawData[i] === '[') depth++;
                        if (rawData[i] === ']') { depth--; if (depth === 0) { endPos = i + 1; break; } }
                    }
                    if (endPos > 0) parsedData = JSON.parse(rawData.substring(0, endPos));
                    else throw new Error('Invalid JSON data');
                }
                // Handle both array and dict formats
                allMathematicians = Array.isArray(parsedData)
                    ? parsedData
                    : Object.entries(parsedData).map(([key, val]) => ({
                        id: key,
                        name: val.displayName || key,
                        birthYear: val.born,
                        deathYear: val.died,
                        ...val
                    }));
                // Transform pages filenames into pagesReferenced objects
                allMathematicians = allMathematicians.map(m => ({
                    ...m,
                    pagesReferenced: (m.pagesReferenced || m.pages || []).map(p =>
                        typeof p === 'string'
                            ? { url: p, title: p.replace('.html', '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) }
                            : p
                    ),
                    connections: m.connections || []
                }));
                filteredMathematicians = [...allMathematicians];
                if (window._constellationBuild) window._constellationBuild(allMathematicians);
                setupEventListeners();
                render();
            } catch (error) {
                console.error('Error loading mathematicians:', error);
                loadingEl.innerHTML = '<p>Error loading data. Please refresh the page.</p>';
            }
        }

        function setupEventListeners() {
            searchInput.addEventListener('input', debounce(applyFilters, 150));
            eraFilter.addEventListener('change', applyFilters);
            fieldFilter.addEventListener('change', applyFilters);

            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    switchView(e.target.dataset.view);
                });
            });
        }

        function debounce(fn, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn(...args), delay);
            };
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedEra = eraFilter.value;
            const selectedField = fieldFilter.value;

            const prevIds = new Set(filteredMathematicians.map(m => m.id));

            filteredMathematicians = allMathematicians.filter(m => {
                const matchesSearch = !searchTerm ||
                    m.name.toLowerCase().includes(searchTerm) ||
                    m.nationality.toLowerCase().includes(searchTerm) ||
                    m.fields.some(f => f.toLowerCase().includes(searchTerm));

                const matchesEra = selectedEra === 'all' || m.era === selectedEra;
                const matchesField = selectedField === 'all' || m.fields.some(f => f.toLowerCase() === selectedField.toLowerCase());

                return matchesSearch && matchesEra && matchesField;
            });

            const newIds = new Set(filteredMathematicians.map(m => m.id));

            // Animate cards out that no longer match, then re-render
            if (currentView === 'grid') {
                const cardsToRemove = document.querySelectorAll('.card');
                let animating = false;
                cardsToRemove.forEach(card => {
                    if (!newIds.has(card.dataset.id)) {
                        animating = true;
                        card.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.92) translateY(8px)';
                    }
                });
                if (animating) {
                    setTimeout(() => render(), 260);
                } else {
                    render();
                }
            } else {
                render();
            }
        }

        function switchView(view) {
            currentView = view;
            expandedCardId = null;

            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });

            gridViewEl.style.display = view === 'grid' ? '' : 'none';
            timelineViewEl.classList.toggle('active', view === 'timeline');
            groupViewEl.classList.toggle('active', view === 'group');

            if (view === 'timeline') {
                setTimeout(renderTimeline, 0);
            } else if (view === 'grid') {
                renderGrid();
            } else if (view === 'group') {
                renderGroup();
            }
        }

        function render() {
            loadingEl.style.display = 'none';

            if (filteredMathematicians.length === 0) {
                gridViewEl.innerHTML = '';
                groupViewEl.innerHTML = '';
                noResultsEl.style.display = 'block';
                timelineViewEl.style.display = 'none';
                return;
            } else {
                noResultsEl.style.display = 'none';
            }

            if (currentView === 'grid') {
                renderGrid();
            } else if (currentView === 'timeline') {
                renderTimeline();
            } else if (currentView === 'group') {
                renderGroup();
            }
        }

        function renderGrid() {
            gridViewEl.innerHTML = filteredMathematicians.map(m => createCard(m)).join('');
            attachCardListeners();
            observeCards();
        }

        function createCard(m) {
            const isExpanded = expandedCardId === m.id;
            const eraColour = eraColours[m.era] || '#60a5fa';

            const tagsHtml = m.fields.map(f =>
                `<span class="tag">${f}</span>`
            ).join('');

            const expandedHtml = isExpanded ? `
                <div class="card-expanded-content">
                    <div class="remarkable-fact">${m.remarkableFact}</div>
                    <div class="pages-list">
                        <div class="pages-title">Their mathematics on this site:</div>
                        <ul>
                            ${m.pagesReferenced.map(page =>
                                `<li><a href="${page.url}">${page.title}</a></li>`
                            ).join('')}
                        </ul>
                    </div>
                    ${m.connections.length > 0 ? `
                        <div class="connections-title">Connected to:</div>
                        <div class="connections-list">
                            ${m.connections.map(connId => {
                                const conn = allMathematicians.find(x => x.id === connId);
                                return conn ? `<button class="connection-btn" onclick="scrollToAndExpand('${connId}')">${conn.name}</button>` : '';
                            }).join('')}
                        </div>
                    ` : ''}
                </div>
            ` : '';

            return `
                <div class="card ${isExpanded ? 'expanded' : ''}" data-id="${m.id}" style="border-left-color: ${eraColour}">
                    <div class="card-name">${m.name}</div>
                    <div class="card-dates">${m.birthYear === m.deathYear ? m.birthYear : `${m.birthYear}–${m.deathYear}`}</div>
                    <div class="card-nationality">${m.nationality}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    <div class="card-summary">${m.summary}</div>
                    <div class="card-references">Referenced on ${m.pagesReferenced.length} page${m.pagesReferenced.length === 1 ? '' : 's'}</div>
                    ${expandedHtml}
                </div>
            `;
        }

        function attachCardListeners() {
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const cardId = card.dataset.id;
                    expandedCardId = expandedCardId === cardId ? null : cardId;
                    renderGrid();
                });
            });
        }

        function scrollToAndExpand(cardId) {
            expandedCardId = cardId;
            renderGrid();
            const card = document.querySelector(`[data-id="${cardId}"]`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-view');

            const eraOrder = [
                { key: 'contemporary', name: 'Contemporary', range: '1945–present' },
                { key: 'modern', name: 'Modern', range: '1900–1945' },
                { key: 'nineteenth', name: '19th Century', range: '1800–1900' },
                { key: 'enlightenment', name: 'Enlightenment', range: '1650–1800' },
                { key: 'renaissance', name: 'Renaissance', range: '1400–1650' },
                { key: 'medieval', name: 'Medieval', range: '500–1400' },
                { key: 'ancient', name: 'Ancient', range: 'before 500 AD' }
            ];

            // Sort mathematicians by birth year descending (most recent first = top)
            const sorted = [...filteredMathematicians].sort((a, b) => b.birthYear - a.birthYear);

            // Group by era
            const byEra = {};
            sorted.forEach(m => {
                const era = m.era || 'ancient';
                if (!byEra[era]) byEra[era] = [];
                byEra[era].push(m);
            });

            let html = '<div class="timeline-present-marker">&#9650; Present day</div>';

            eraOrder.forEach(era => {
                const mathematicians = byEra[era.key];
                if (!mathematicians || mathematicians.length === 0) return;

                const colour = eraColours[era.key] || '#60a5fa';

                html += `<div class="timeline-era-section">`;
                html += `<div class="timeline-line" style="background: ${colour};"></div>`;
                html += `<div class="timeline-era-label" style="background: ${colour}22; color: ${colour}; border: 1px solid ${colour}44;">${era.name} <span style="opacity: 0.7; font-weight: 400;">${era.range}</span></div>`;

                mathematicians.forEach(m => {
                    const isExpanded = expandedCardId === m.id;
                    const dates = m.dates || (m.birthYear === m.deathYear ? `${m.birthYear}` : `${m.birthYear}–${m.deathYear || 'present'}`);
                    const expandedHtml = isExpanded ? `
                        <div class="card-expanded-content" style="display:block">
                            <div class="remarkable-fact">${m.remarkableFact || ''}</div>
                            <div class="pages-list">
                                <div class="pages-title">Their mathematics on this site:</div>
                                <ul>
                                    ${(m.pagesReferenced || []).map(page =>
                                        '<li><a href="' + page.url + '">' + page.title + '</a></li>'
                                    ).join('')}
                                </ul>
                            </div>
                            ${(m.connections || []).length > 0 ? '<div class="connections-title">Connected to:</div><div class="connections-list">' +
                                m.connections.map(connId => {
                                    const conn = allMathematicians.find(x => x.id === connId);
                                    return conn ? '<button class="connection-btn" onclick="event.stopPropagation(); timelineScrollTo(\'' + connId + '\')">' + conn.name + '</button>' : '';
                                }).join('') + '</div>' : ''}
                        </div>` : '';

                    html += `
                        <div class="timeline-entry ${isExpanded ? 'expanded' : ''}" data-id="${m.id}" onclick="toggleTimelineEntry('${m.id}')">
                            <div class="timeline-dot" style="background: ${colour};"></div>
                            <div>
                                <span class="timeline-entry-name">${m.name}</span>
                                <span class="timeline-entry-dates">${dates}</span>
                            </div>
                            <div class="timeline-entry-summary">${m.summary || ''}</div>
                            <div class="timeline-entry-fields">
                                ${m.fields.map(f => '<span class="tag">' + f + '</span>').join('')}
                            </div>
                            ${expandedHtml}
                        </div>`;
                });

                html += `</div>`;
            });

            html += '<div class="timeline-ancient-marker">&#9660; Ancient times</div>';

            container.innerHTML = html;
        }

        function toggleTimelineEntry(id) {
            expandedCardId = expandedCardId === id ? null : id;
            renderTimeline();
            if (expandedCardId) {
                const el = document.querySelector(`.timeline-entry[data-id="${id}"]`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function timelineScrollTo(id) {
            expandedCardId = id;
            renderTimeline();
            const el = document.querySelector(`.timeline-entry[data-id="${id}"]`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderGroup() {
            const fieldsInData = new Set();
            filteredMathematicians.forEach(m => {
                m.fields.forEach(f => fieldsInData.add(f.toLowerCase()));
            });

            const fieldMap = {
                'algebra': 'Algebra', 'analysis': 'Analysis', 'geometry': 'Geometry',
                'probability': 'Probability', 'computation': 'Computation',
                'physics': 'Physics', 'number-theory': 'Number Theory', 'logic': 'Logic',
                'economics': 'Economics', 'mechanics': 'Mechanics', 'arithmetic': 'Arithmetic',
                'calculus': 'Calculus', 'combinatorics': 'Combinatorics', 'graph-theory': 'Graph Theory',
                'statistics': 'Statistics', 'topology': 'Topology', 'set-theory': 'Set Theory',
                'information-theory': 'Information Theory', 'game-theory': 'Game Theory',
                'control-theory': 'Control Theory', 'finance': 'Finance',
                'cryptography': 'Cryptography', 'signal-processing': 'Signal Processing',
                'group-theory': 'Group Theory', 'astronomy': 'Astronomy'
            };
            const fieldOrder = ['algebra', 'analysis', 'geometry', 'number-theory', 'probability',
                'statistics', 'computation', 'information-theory', 'physics', 'mechanics',
                'logic', 'combinatorics', 'topology', 'set-theory', 'economics', 'game-theory',
                'finance', 'cryptography', 'control-theory', 'graph-theory', 'group-theory',
                'signal-processing', 'astronomy', 'arithmetic', 'calculus'];
            const sortedFields = fieldOrder.filter(f => fieldsInData.has(f));
            // Include any fields from data not in the predefined order
            fieldsInData.forEach(f => { if (!sortedFields.includes(f)) sortedFields.push(f); });

            let html = '';
            sortedFields.forEach(field => {
                const displayName = fieldMap[field] || field.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                const inField = filteredMathematicians.filter(m => m.fields.some(f => f.toLowerCase() === field));
                html += `
                    <div class="subject-section">
                        <h3 class="subject-title">${displayName}</h3>
                        <div class="subject-grid">
                            ${inField.map(m => createCard(m)).join('')}
                        </div>
                    </div>
                `;
            });

            groupViewEl.innerHTML = html;
            attachCardListeners();
            observeCards();
        }

        window.addEventListener('load', loadMathematicians);
    </script>
</body>
</html>
