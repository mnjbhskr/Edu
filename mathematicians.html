        * {

        .container {

            margin: 0 auto;

        }

        header {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .header-back {
            display: inline-block;

            color: #808092;

        h1 {
            font-size: 2.8em;
            font-weight: 400;

            color: #f0f0f0;
        }

        .subtitle {
            font-size: 1.1em;
            color: #a0a0b8;
            font-style: italic;
        }

        .controls-section {
            padding: 24px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .search-box {
            width: 100%;

            padding: 14px 16px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);

        .view-btn:hover {

        .view-btn.active {

                        <option value="computation">Computation</option>
                        <option value="physics">Physics</option>
                        <option value="mechanics">Mechanics</option>
                        <option value="logic">Logic</option>
                        <option value="information-theory">Information Theory</option>
                        <option value="combinatorics">Combinatorics</option>
                        <option value="topology">Topology</option>

    <script src="js/mathematician-cards.js"></script>
    <script>
        const eraColours = {
            ancient: '#fbbf24',
            medieval: '#fb923c',
            renaissance: '#f87171',
            enlightenment: '#60a5fa',
            nineteenth: '#818cf8',
            modern: '#22d3ee',
            contemporary: '#10b981'
        };

        let allMathematicians = [];
        let filteredMathematicians = [];
        let currentView = 'grid';
        let expandedCardId = null;
        let timelineState = {
            scrollOffset: 0,
            zoomLevel: 1,
            minYear: -600,
            maxYear: 2026
        };

        const loadingEl = document.getElementById('loading');
        const gridViewEl = document.getElementById('grid-view');
        const timelineViewEl = document.getElementById('timeline-view');
        const groupViewEl = document.getElementById('group-view');
        const noResultsEl = document.getElementById('no-results');
        const searchInput = document.getElementById('search-input');
        const eraFilter = document.getElementById('filter-era');
        const fieldFilter = document.getElementById('filter-field');
        const levelFilter = document.getElementById('filter-level');

        async function loadMathematicians() {
            loadingEl.style.display = 'block';
            try {
                const response = await fetch('data/mathematicians.json');
                if (!response.ok) throw new Error('Failed to load data');
                const rawData = await response.text();
                let parsedData;
                try {
                    parsedData = JSON.parse(rawData);
                } catch(e) {
                    // If JSON is broken, extract valid array portion
                    let depth = 0, endPos = -1;
                    for (let i = 0; i < rawData.length; i++) {
                        if (rawData[i] === '[') depth++;
                        if (rawData[i] === ']') { depth--; if (depth === 0) { endPos = i + 1; break; } }
                    }
                    if (endPos > 0) parsedData = JSON.parse(rawData.substring(0, endPos));
                    else throw new Error('Invalid JSON data');
                }
                // Handle both array and dict formats
                allMathematicians = Array.isArray(parsedData)
                    ? parsedData
                    : Object.entries(parsedData).map(([key, val]) => ({
                        id: key,
                        name: val.displayName || key,
                        birthYear: val.born,
                        deathYear: val.died,
                        ...val
                    }));
                // Transform pages filenames into pagesReferenced objects
                allMathematicians = allMathematicians.map(m => ({
                    ...m,
                    pagesReferenced: (m.pagesReferenced || m.pages || []).map(p =>
                        typeof p === 'string'
                            ? { url: p, title: p.replace('.html', '').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()) }
                            : p
                    ),
                    connections: m.connections || []
                }));
                filteredMathematicians = [...allMathematicians];
                setupEventListeners();
                render();
            } catch (error) {
                console.error('Error loading mathematicians:', error);
                loadingEl.innerHTML = '<p>Error loading data. Please refresh the page.</p>';
            }
        }

        function setupEventListeners() {
            searchInput.addEventListener('input', debounce(applyFilters, 150));
            eraFilter.addEventListener('change', applyFilters);
            fieldFilter.addEventListener('change', applyFilters);
            levelFilter.addEventListener('change', applyFilters);

            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    switchView(e.target.dataset.view);
                });
            });

            document.getElementById('zoom-in').addEventListener('click', () => {
                timelineState.zoomLevel = Math.min(timelineState.zoomLevel + 0.2, 3);
                renderTimeline();
            });

            document.getElementById('zoom-out').addEventListener('click', () => {
                timelineState.zoomLevel = Math.max(timelineState.zoomLevel - 0.2, 0.5);
                renderTimeline();
            });
        }

        function debounce(fn, delay) {
            let timeout;
            return function (...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => fn(...args), delay);
            };
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedEra = eraFilter.value;
            const selectedField = fieldFilter.value;
            const selectedLevel = levelFilter.value;

            filteredMathematicians = allMathematicians.filter(m => {
                const matchesSearch = !searchTerm ||
                    m.name.toLowerCase().includes(searchTerm) ||
                    m.nationality.toLowerCase().includes(searchTerm) ||
                    m.fields.some(f => f.toLowerCase().includes(searchTerm));

                const matchesEra = selectedEra === 'all' || m.era === selectedEra;
                const matchesField = selectedField === 'all' || m.fields.some(f => f.toLowerCase() === selectedField.toLowerCase());
                const matchesLevel = selectedLevel === 'all' || (m.levels && m.levels.includes(selectedLevel));

                return matchesSearch && matchesEra && matchesField && matchesLevel;
            });

            render();
        }

        function switchView(view) {
            currentView = view;
            expandedCardId = null;

            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === view);
            });

            gridViewEl.style.display = view === 'grid' ? '' : 'none';
            timelineViewEl.classList.toggle('active', view === 'timeline');
            groupViewEl.classList.toggle('active', view === 'group');

            if (view === 'timeline') {
                setTimeout(renderTimeline, 0);
            } else if (view === 'grid') {
                renderGrid();
            } else if (view === 'group') {
                renderGroup();
            }
        }

        function render() {
            loadingEl.style.display = 'none';

            if (filteredMathematicians.length === 0) {
                gridViewEl.innerHTML = '';
                groupViewEl.innerHTML = '';
                noResultsEl.style.display = 'block';
                timelineViewEl.style.display = 'none';
                return;
            } else {
                noResultsEl.style.display = 'none';
            }

            if (currentView === 'grid') {
                renderGrid();
            } else if (currentView === 'timeline') {
                renderTimeline();
            } else if (currentView === 'group') {
                renderGroup();
            }
        }

        function renderGrid() {
            gridViewEl.innerHTML = filteredMathematicians.map(m => createCard(m)).join('');
            attachCardListeners();
        }

        function createCard(m) {
            const isExpanded = expandedCardId === m.id;
            const eraColour = eraColours[m.era] || '#60a5fa';

            const tagsHtml = m.fields.map(f =>
                `<span class="tag">${f}</span>`
            ).join('');

            const expandedHtml = isExpanded ? `
                <div class="card-expanded-content">
                    <div class="remarkable-fact">${m.remarkableFact}</div>
                    <div class="pages-list">
                        <div class="pages-title">Their mathematics on this site:</div>
                        <ul>
                            ${m.pagesReferenced.map(page =>
                                `<li><a href="${page.url}">${page.title}</a></li>`
                            ).join('')}
                        </ul>
                    </div>
                    ${m.connections.length > 0 ? `
                        <div class="connections-title">Connected to:</div>
                        <div class="connections-list">
                            ${m.connections.map(connId => {
                                const conn = allMathematicians.find(x => x.id === connId);
                                return conn ? `<button class="connection-btn" onclick="scrollToAndExpand('${connId}')">${conn.name}</button>` : '';
                            }).join('')}
                        </div>
                    ` : ''}
                </div>
            ` : '';

            return `
                <div class="card ${isExpanded ? 'expanded' : ''}" data-id="${m.id}" style="border-left-color: ${eraColour}">
                    <div class="card-name">${m.name}</div>
                    <div class="card-dates">${m.birthYear === m.deathYear ? m.birthYear : `${m.birthYear}–${m.deathYear}`}</div>
                    <div class="card-nationality">${m.nationality}</div>
                    <div class="card-tags">${tagsHtml}</div>
                    <div class="card-summary">${m.summary}</div>
                    <div class="card-references">Referenced on ${m.pagesReferenced.length} page${m.pagesReferenced.length === 1 ? '' : 's'}</div>
                    ${expandedHtml}
                </div>
            `;
        }

        function attachCardListeners() {
            document.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', () => {
                    const cardId = card.dataset.id;
                    expandedCardId = expandedCardId === cardId ? null : cardId;
                    renderGrid();
                });
            });
        }

        function scrollToAndExpand(cardId) {
            expandedCardId = cardId;
            renderGrid();
            const card = document.querySelector(`[data-id="${cardId}"]`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        function renderTimeline() {
            const canvas = document.getElementById('timeline-canvas');
            const ctx = canvas.getContext('2d');

            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            const canvasWidth = canvas.width;
            const canvasHeight = canvas.height;

            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);

            const yearRange = timelineState.maxYear - timelineState.minYear;
            const pixelsPerYear = (canvasWidth - 80) / (yearRange / timelineState.zoomLevel);
            const startX = 40 + timelineState.scrollOffset;

            const eraRanges = [
                { name: 'Ancient', min: -600, max: 500, colour: eraColours.ancient },
                { name: 'Medieval', min: 500, max: 1400, colour: eraColours.medieval },
                { name: 'Renaissance', min: 1400, max: 1600, colour: eraColours.renaissance },
                { name: 'Enlightenment', min: 1600, max: 1800, colour: eraColours.enlightenment },
                { name: '19th Century', min: 1800, max: 1900, colour: eraColours.nineteenth },
                { name: 'Modern', min: 1900, max: 1945, colour: eraColours.modern },
                { name: 'Contemporary', min: 1945, max: 2026, colour: eraColours.contemporary }
            ];

            eraRanges.forEach(era => {
                const eraStartX = startX + (era.min - timelineState.minYear) * pixelsPerYear;
                const eraWidth = (era.max - era.min) * pixelsPerYear;
                ctx.fillStyle = era.colour;
                ctx.globalAlpha = 0.15;
                ctx.fillRect(eraStartX, 0, eraWidth, canvasHeight);
                ctx.globalAlpha = 1;
            });

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(startX, canvasHeight / 2);
            ctx.lineTo(startX + yearRange * pixelsPerYear, canvasHeight / 2);
            ctx.stroke();

            const dotRadius = 6;
            const verticalSpacing = 40;
            let yPositions = {};

            filteredMathematicians.forEach(m => {
                const x = startX + (m.birthYear - timelineState.minYear) * pixelsPerYear;

                if (x < 0 || x > canvasWidth) return;

                let y = canvasHeight / 2;
                if (!yPositions[m.id]) {
                    let row = 0;
                    let overlaps = true;
                    while (overlaps) {
                        y = canvasHeight / 2 + (row % 2 === 0 ? 1 : -1) * Math.ceil(row / 2) * verticalSpacing;
                        overlaps = Object.values(yPositions).some(pos => Math.abs(pos - y) < verticalSpacing);
                        row++;
                    }
                    yPositions[m.id] = y;
                } else {
                    y = yPositions[m.id];
                }

                const eraColour = eraColours[m.era] || '#60a5fa';
                ctx.fillStyle = eraColour;
                ctx.beginPath();
                ctx.arc(x, y, dotRadius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#0a0a1a';
                ctx.lineWidth = 2;
                ctx.stroke();

                canvas.dataset[`m${m.id}`] = JSON.stringify({ x, y, dotRadius, m });
            });

            ctx.fillStyle = '#606078';
            ctx.font = '12px Georgia, serif';
            ctx.textAlign = 'center';
            ctx.fillText(`${timelineState.minYear} BC/AD`, startX, canvasHeight - 15);
            ctx.fillText(`${timelineState.maxYear}`, startX + yearRange * pixelsPerYear, canvasHeight - 15);

            canvas.addEventListener('click', (e) => handleTimelineClick(e, canvas, yPositions));
        }

        function handleTimelineClick(e, canvas, yPositions) {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            let clicked = null;
            for (let [id, pos] of Object.entries(yPositions)) {
                const m = allMathematicians.find(m => m.id === id);
                if (!m) continue;

                const yearRange = timelineState.maxYear - timelineState.minYear;
                const pixelsPerYear = (canvas.width - 80) / (yearRange / timelineState.zoomLevel);
                const startX = 40 + timelineState.scrollOffset;
                const dotX = startX + (m.birthYear - timelineState.minYear) * pixelsPerYear;

                const dist = Math.sqrt((x - dotX) ** 2 + (y - pos) ** 2);
                if (dist <= 10) {
                    clicked = m.id;
                    break;
                }
            }

            if (clicked) {
                expandedCardId = expandedCardId === clicked ? null : clicked;
                showTimelineCard(clicked);
            }
        }

        function showTimelineCard(mathId) {
            const m = allMathematicians.find(x => x.id === mathId);
            if (!m) return;

            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 0, 0, 0.8);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                padding: 20px;
            `;

            const eraColour = eraColours[m.era] || '#60a5fa';
            const tagsHtml = m.fields.map(f => `<span class="tag">${f}</span>`).join('');

            const content = document.createElement('div');
            content.style.cssText = `
                background: #0a0a1a;
                border: 1px solid rgba(96, 165, 250, 0.3);
                border-radius: 8px;
                padding: 28px;
                max-width: 500px;
                max-height: 80vh;
                overflow-y: auto;
                border-left: 4px solid ${eraColour};
            `;
            content.innerHTML = `
                <h3 style="font-size: 1.3em; margin-bottom: 8px; color: #f0f0f0;">${m.name}</h3>
                <div style="font-size: 0.9em; color: #a0a0b8; margin-bottom: 6px;">${m.birthYear === m.deathYear ? m.birthYear : `${m.birthYear}–${m.deathYear}`}</div>
                <div style="font-size: 0.85em; color: #808092; margin-bottom: 12px;">${m.nationality}</div>
                <div style="margin-bottom: 14px;">${tagsHtml}</div>
                <div style="font-size: 0.95em; color: #c0c0d8; margin-bottom: 16px; line-height: 1.6;">${m.summary}</div>
                <div style="font-style: italic; color: #b0b0c8; margin-bottom: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.1);">${m.remarkableFact}</div>
                <button onclick="this.parentElement.parentElement.remove()" style="padding: 8px 16px; background: #60a5fa; color: #0a0a1a; border: none; border-radius: 4px; cursor: pointer; font-family: Georgia, serif; width: 100%;">Close</button>
            `;

            modal.appendChild(content);
            document.body.appendChild(modal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.remove();
            });
        }

        function renderGroup() {
            const fieldsInData = new Set();
            filteredMathematicians.forEach(m => {
                m.fields.forEach(f => fieldsInData.add(f.toLowerCase()));
            });

            const fieldMap = {
                'algebra': 'Algebra', 'analysis': 'Analysis', 'geometry': 'Geometry',
                'probability': 'Probability', 'computation': 'Computation',
                'physics': 'Physics', 'number-theory': 'Number Theory', 'logic': 'Logic',
                'economics': 'Economics', 'mechanics': 'Mechanics', 'arithmetic': 'Arithmetic',
                'calculus': 'Calculus', 'combinatorics': 'Combinatorics', 'graph-theory': 'Graph Theory',
                'statistics': 'Statistics', 'topology': 'Topology', 'set-theory': 'Set Theory',
                'information-theory': 'Information Theory', 'game-theory': 'Game Theory',
                'control-theory': 'Control Theory', 'finance': 'Finance',
                'cryptography': 'Cryptography', 'signal-processing': 'Signal Processing',
                'group-theory': 'Group Theory', 'astronomy': 'Astronomy'
            };
            const fieldOrder = ['algebra', 'analysis', 'geometry', 'number-theory', 'probability',
                'statistics', 'computation', 'information-theory', 'physics', 'mechanics',
                'logic', 'combinatorics', 'topology', 'set-theory', 'economics', 'game-theory',
                'finance', 'cryptography', 'control-theory', 'graph-theory', 'group-theory',
                'signal-processing', 'astronomy', 'arithmetic', 'calculus'];
            const sortedFields = fieldOrder.filter(f => fieldsInData.has(f));
            // Include any fields from data not in the predefined order
            fieldsInData.forEach(f => { if (!sortedFields.includes(f)) sortedFields.push(f); });

            let html = '';
            sortedFields.forEach(field => {
                const displayName = fieldMap[field] || field.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
                const inField = filteredMathematicians.filter(m => m.fields.some(f => f.toLowerCase() === field));
                html += `
                    <div class="subject-section">
                        <h3 class="subject-title">${displayName}</h3>
                        <div class="subject-grid">
                            ${inField.map(m => createCard(m)).join('')}
                        </div>
                    </div>
                `;
            });

            groupViewEl.innerHTML = html;
            attachCardListeners();
        }

        window.addEventListener('load', loadMathematicians);
    </script>
</body>
</html>
