<script>
/* ---- HiDPI Setup ---- */
const cvs = document.getElementById("cv");
const ctx = cvs.getContext("2d");
const dpr = window.devicePixelRatio || 1;
const cssW = 904, cssH = 400;
cvs.width = cssW * dpr;
cvs.height = cssH * dpr;
cvs.style.width = cssW + "px";
cvs.style.height = "auto";
ctx.scale(dpr, dpr);
const W = cssW, H = cssH;

/* ---- Vibrant Colours ---- */
const GOLD   = "#fbbf24";
const CYAN   = "#22d3ee";
const ROSE   = "#fb7185";
const VIOLET = "#a855f7";

/* ---- State ---- */
let cx = 0, cy = 0;
let zoom = 40;
let dragging = false, dragX = 0, dragY = 0, dragCX = 0, dragCY = 0;
let paused = false;
let globalTime = 0;

const families = { N: true, Z: false, Q: false, R: false, C: false };
const COL = { N: "#2ecc71", Z: "#3b82f6", Q: "#f97316", R: GOLD, C: "#c084fc" };

/* ---- Animation State ---- */
let autoAnim = null;      /* { phase, t, ... } */
let densityAnim = null;   /* { t, centreA, centreB, targetZoom } */
let opAnim = null;        /* { start, end, t, trail } */

/* ---- Data ---- */
const SPECIALS = [
    { sym: "\u03C0",  val: Math.PI,            approx: "3.14159...", desc: "ratio of circumference to diameter" },
    { sym: "e",       val: Math.E,             approx: "2.71828...", desc: "base of natural logarithm" },
    { sym: "\u221A2", val: Math.SQRT2,         approx: "1.41421...", desc: "diagonal of unit square, first known irrational" },
    { sym: "\u03C6",  val: (1+Math.sqrt(5))/2, approx: "1.61803...", desc: "golden ratio" },
    { sym: "0",       val: 0,                  approx: "0",          desc: "the additive identity" },
    { sym: "i",       val: null,               approx: "0 + 1i",    desc: "the imaginary unit", complex: true }
];

const COMPLEX_PTS = [
    { re: 0, im: 1,  label: "i" },
    { re: 0, im: -1, label: "\u2212i" },
    { re: -1, im: 0, label: "\u22121 = e^(i\u03C0)" },
    { re: 1,  im: 1, label: "1 + i" },
    { re: 1,  im: 0, label: "1" },
    { re: 0,  im: 0, label: "0" }
];

const INFO = {
    N: { name: "\u2115 Natural Numbers",
         text: "Countable. Closed under addition and multiplication. The foundation \u2014 everything starts with counting.",
         props: [["Countable","yes"],["Dense","no"],["Complete","no"],["+ \u00D7","yes"],["\u2212 \u00F7","no"]] },
    Z: { name: "\u2124 Integers",
         text: "Countable. Closed under addition, subtraction, multiplication. Adding negatives lets us subtract freely.",
         props: [["Countable","yes"],["Dense","no"],["Complete","no"],["+ \u2212 \u00D7","yes"],["\u00F7","no"]] },
    Q: { name: "\u211A Rationals",
         text: "Countable (surprisingly!). Dense \u2014 between any two rationals lies another. Closed under all four operations (except \u00F70). But has \u2018holes\u2019 where irrationals live.",
         props: [["Countable","yes"],["Dense","yes"],["Complete","no"],["+ \u2212 \u00D7 \u00F7","yes"]] },
    R: { name: "\u211D Reals",
         text: "Uncountable! Complete \u2014 no holes. The continuum. Contains both rationals and irrationals. |\u211D| > |\u211A| even though both are infinite.",
         props: [["Uncountable","yes"],["Dense","yes"],["Complete","yes"],["+ \u2212 \u00D7 \u00F7","yes"]] },
    C: { name: "\u2102 Complex Numbers",
         text: "Algebraically closed \u2014 every polynomial has a root here. The Fundamental Theorem of Algebra guarantees it. Two-dimensional: every complex number is a + bi.",
         props: [["Uncountable","yes"],["Algebraically Closed","yes"],["+ \u2212 \u00D7 \u00F7","yes"],["Ordered","no"]] }
};

/* ---- Coordinate transforms ---- */
function w2s(wx, wy) { return [W/2 + cx + wx*zoom, H/2 + cy - wy*zoom]; }
function s2w(sx, sy) { return [(sx - W/2 - cx)/zoom, -(sy - H/2 - cy)/zoom]; }

/* ---- Utilities ---- */
function gcd(a, b) { while (b) { [a, b] = [b, a % b]; } return a; }
function tooClose(arr, v, minDist) {
    for (const x of arr) if (Math.abs(x - v) < minDist) return true;
    return false;
}
function niceStep(ppu) {
    const steps = [0.001,0.002,0.005, 0.01,0.02,0.05, 0.1,0.2,0.5,
                   1,2,5, 10,20,50, 100,200,500, 1000];
    for (const s of steps) if (s * ppu >= 60) return s;
    return 1000;
}
function lerp(a, b, t) { return a + (b - a) * t; }
function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }

function drawStar(x, y, r, pts) {
    ctx.beginPath();
    for (let i = 0; i < pts * 2; i++) {
        const a = Math.PI/2 + Math.PI * i / pts;
        const d = i % 2 === 0 ? r : r * 0.45;
        const px = x + Math.cos(a) * d, py = y - Math.sin(a) * d;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
}

function drawGlow(x, y, radius, colour, intensity) {
    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, colour.replace(")", "," + intensity + ")").replace("rgb","rgba"));
    grad.addColorStop(1, "transparent");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.fill();
}

function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return "rgba("+r+","+g+","+b+","+alpha+")";
}

/* ============================================================
   DRAWING  —  1-D Number Line
   ============================================================ */
function drawNumberLine() {
    ctx.fillStyle = "#111122"; ctx.fillRect(0, 0, W, H);

    /* Axis */
    const [, ay] = w2s(0, 0);
    const axY = Math.max(30, Math.min(H - 30, ay));
    ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, axY); ctx.lineTo(W, axY); ctx.stroke();

    /* Tick marks and labels */
    const step = niceStep(zoom);
    const [wl] = s2w(0, 0), [wr] = s2w(W, 0);
    const lo = Math.floor(wl / step) * step;
    const hi = Math.ceil(wr / step) * step;

    ctx.textAlign = "center"; ctx.textBaseline = "top"; ctx.font = "11px Georgia";
    for (let v = lo; v <= hi + step * 0.5; v += step) {
        const sv = Math.round(v / step) * step;
        const [sx] = w2s(sv, 0);
        if (sx < -10 || sx > W + 10) continue;
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.beginPath(); ctx.moveTo(sx, axY - 5); ctx.lineTo(sx, axY + 5); ctx.stroke();
        ctx.fillStyle = "#808098";
        const dp = Math.max(0, -Math.floor(Math.log10(step)));
        const lbl = Math.abs(sv) < 1e-9 ? "0" : (Number.isInteger(sv) ? String(sv) : sv.toFixed(dp));
        ctx.fillText(lbl, sx, axY + 8);
    }

    /* Arrow heads at ends */
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.beginPath(); ctx.moveTo(W - 2, axY); ctx.lineTo(W - 10, axY - 4); ctx.lineTo(W - 10, axY + 4); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2, axY); ctx.lineTo(10, axY - 4); ctx.lineTo(10, axY + 4); ctx.fill();

    /* ---- Reals band ---- */
    if (families.R) {
        ctx.fillStyle = "rgba(251,191,36,0.06)";
        ctx.fillRect(0, axY - 14, W, 28);
    }

    /* ---- Rationals ---- */
    if (families.Q) {
        const maxDen = Math.min(Math.max(2, Math.floor(zoom / 6)), 80);
        const usedX = [];
        for (let d = 2; d <= maxDen; d++) {
            for (let n = Math.floor(wl * d); n <= Math.ceil(wr * d); n++) {
                if (gcd(Math.abs(n), d) !== 1) continue;
                const val = n / d;
                const [sx] = w2s(val, 0);
                if (sx < 0 || sx > W) continue;
                if (tooClose(usedX, sx, 12)) continue;
                usedX.push(sx);
                const r = Math.max(1.5, 4 - d * 0.12);
                ctx.fillStyle = CYAN;
                ctx.globalAlpha = Math.max(0.25, 1 - d / maxDen * 0.7);
                ctx.beginPath(); ctx.arc(sx, axY, r, 0, Math.PI * 2); ctx.fill();
                if (d <= 6 && zoom > 18) {
                    ctx.font = "9px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                    ctx.fillText(n + "/" + d, sx, axY - 7);
                }
                ctx.globalAlpha = 1;
            }
        }
    }

    /* ---- Integers (negative only if N also on) ---- */
    if (families.Z) {
        for (let v = Math.floor(wl); v <= Math.ceil(wr); v++) {
            if (v >= 0 && families.N) continue;
            const [sx] = w2s(v, 0);
            if (sx < 0 || sx > W) continue;
            ctx.fillStyle = COL.Z;
            ctx.beginPath(); ctx.arc(sx, axY, 4.5, 0, Math.PI * 2); ctx.fill();
            if (zoom > 15) {
                ctx.font = "10px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                ctx.fillStyle = COL.Z; ctx.fillText(String(v), sx, axY - 8);
            }
        }
    }

    /* ---- Naturals ---- */
    if (families.N) {
        for (let v = Math.max(0, Math.floor(wl)); v <= Math.ceil(wr); v++) {
            const [sx] = w2s(v, 0);
            if (sx < 0 || sx > W) continue;

            /* Auto-animate: pop-in effect */
            let scale = 1, alpha = 1;
            if (autoAnim && autoAnim.phase === 0) {
                const revealIdx = v;
                const revealT = (autoAnim.t * 12) - revealIdx;
                if (revealT < 0) { scale = 0; alpha = 0; }
                else if (revealT < 1) { scale = easeInOut(revealT); alpha = revealT; }
            }

            ctx.globalAlpha = alpha;
            ctx.fillStyle = GOLD;
            ctx.beginPath(); ctx.arc(sx, axY, 4.5 * scale, 0, Math.PI * 2); ctx.fill();
            if (zoom > 15 && scale > 0.5) {
                ctx.font = "10px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
                ctx.fillStyle = GOLD; ctx.fillText(String(v), sx, axY - 8);
            }
            ctx.globalAlpha = 1;
        }
    }

    /* ---- Special irrationals ---- */
    if (families.R) {
        const irr = [
            { v: Math.PI,            l: "\u03C0" },
            { v: Math.E,             l: "e" },
            { v: Math.SQRT2,         l: "\u221A2" },
            { v: (1+Math.sqrt(5))/2, l: "\u03C6" }
        ];
        const usedLabels = [];
        irr.forEach((s, idx) => {
            const [sx] = w2s(s.v, 0);
            if (sx < 5 || sx > W - 5) return;
            if (tooClose(usedLabels, sx, 70)) return;
            usedLabels.push(sx);

            /* Pulsing glow for irrationals */
            const pulse = 0.6 + 0.4 * Math.sin(globalTime * 2 + idx * 1.5);
            ctx.save();
            const glowGrad = ctx.createRadialGradient(sx, axY, 0, sx, axY, 18);
            glowGrad.addColorStop(0, hexToRgba(ROSE, 0.3 * pulse));
            glowGrad.addColorStop(1, "transparent");
            ctx.fillStyle = glowGrad;
            ctx.beginPath(); ctx.arc(sx, axY, 18, 0, Math.PI*2); ctx.fill();
            ctx.restore();

            ctx.fillStyle = ROSE;
            drawStar(sx, axY, 7, 5);
            ctx.font = "12px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
            ctx.fillStyle = ROSE;
            ctx.fillText(s.l + " \u2248 " + s.v.toFixed(5), sx, axY - 12);
        });
    }

    /* ---- Operation journey dot ---- */
    if (opAnim) {
        const pos = lerp(opAnim.start, opAnim.end, easeInOut(opAnim.t));
        const [sx] = w2s(pos, 0);

        /* Draw trail */
        ctx.strokeStyle = hexToRgba(VIOLET, 0.5);
        ctx.lineWidth = 3;
        ctx.setLineDash([4, 4]);
        const [startSx] = w2s(opAnim.start, 0);
        const [endSx] = w2s(lerp(opAnim.start, opAnim.end, easeInOut(opAnim.t)), 0);
        ctx.beginPath(); ctx.moveTo(startSx, axY - 20); ctx.lineTo(endSx, axY - 20); ctx.stroke();
        ctx.setLineDash([]);

        /* Arc hops */
        const numHops = Math.max(1, Math.round(Math.abs(opAnim.end - opAnim.start)));
        const hopW = (opAnim.end - opAnim.start) / numHops;
        for (let h = 0; h < numHops; h++) {
            const hopStart = opAnim.start + h * hopW;
            const hopEnd = hopStart + hopW;
            const hopProgress = (opAnim.t * numHops) - h;
            if (hopProgress < 0 || hopProgress > 1) continue;
            const [hsx] = w2s(hopStart, 0);
            const [hex2] = w2s(hopEnd, 0);
            const midX = (hsx + hex2) / 2;
            const arcHeight = 25;
            ctx.strokeStyle = hexToRgba(VIOLET, 0.3);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(hsx, axY - 20);
            ctx.quadraticCurveTo(midX, axY - 20 - arcHeight, hex2, axY - 20);
            ctx.stroke();
        }

        /* Glowing dot */
        const glowGrad = ctx.createRadialGradient(sx, axY - 20, 0, sx, axY - 20, 20);
        glowGrad.addColorStop(0, hexToRgba(VIOLET, 0.6));
        glowGrad.addColorStop(1, "transparent");
        ctx.fillStyle = glowGrad;
        ctx.beginPath(); ctx.arc(sx, axY - 20, 20, 0, Math.PI*2); ctx.fill();

        ctx.fillStyle = VIOLET;
        ctx.beginPath(); ctx.arc(sx, axY - 20, 6, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(sx, axY - 20, 6, 0, Math.PI*2); ctx.stroke();

        /* Labels */
        ctx.font = "11px Georgia"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        ctx.fillStyle = VIOLET;
        const opSymbol = opAnim.end > opAnim.start ? "+" : "\u2212";
        const amount = Math.abs(opAnim.end - opAnim.start);
        ctx.fillText(opAnim.start + " " + opSymbol + " " + amount + " = " + opAnim.end, sx, axY - 32);
    }

    /* ---- Density animation overlay ---- */
    if (densityAnim) {
        const [sa] = w2s(densityAnim.centreA, 0);
        const [sb] = w2s(densityAnim.centreB, 0);
        ctx.strokeStyle = hexToRgba(CYAN, 0.4 + 0.3 * Math.sin(globalTime * 3));
        ctx.lineWidth = 2;
        ctx.setLineDash([3, 3]);
        ctx.beginPath(); ctx.moveTo(sa, axY - 30); ctx.lineTo(sa, axY + 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(sb, axY - 30); ctx.lineTo(sb, axY + 30); ctx.stroke();
        ctx.setLineDash([]);

        /* Label */
        ctx.font = "11px Georgia"; ctx.fillStyle = CYAN;
        ctx.textAlign = "center"; ctx.textBaseline = "bottom";
        const mid = (densityAnim.centreA + densityAnim.centreB) / 2;
        const [smid] = w2s(mid, 0);
        ctx.fillText("Always another rational between these two", smid, axY - 35);
    }

    /* Zoom indicator */
    ctx.font = "11px Georgia"; ctx.fillStyle = "#606078";
    ctx.textAlign = "right"; ctx.textBaseline = "top";
    ctx.fillText("Zoom: " + zoom.toFixed(zoom < 10 ? 1 : 0) + "x", W - 12, 12);

    /* Hint */
    ctx.textAlign = "left";
    ctx.fillText("Scroll to zoom \u00B7 Drag to pan", 12, 12);

    /* Paused indicator */
    if (paused) {
        ctx.font = "14px Georgia"; ctx.fillStyle = GOLD;
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText("\u275A\u275A Paused", W/2, 12);
    }
}

/* ============================================================
   DRAWING  —  2-D Complex Plane
   ============================================================ */
function drawComplexPlane() {
    ctx.fillStyle = "#111122"; ctx.fillRect(0, 0, W, H);
    const step = niceStep(zoom);
    const [wl, wt] = s2w(0, 0), [wr, wb] = s2w(W, H);

    /* Grid lines */
    ctx.strokeStyle = "rgba(255,255,255,0.05)"; ctx.lineWidth = 0.5;
    for (let v = Math.floor(wl/step)*step; v <= wr + step*0.5; v += step) {
        const [sx] = w2s(v, 0);
        ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
    }
    for (let v = Math.floor(wb/step)*step; v <= wt + step*0.5; v += step) {
        const [, sy] = w2s(0, v);
        ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
    }

    /* Real and imaginary axes */
    const [ox, oy] = w2s(0, 0);
    ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, oy); ctx.lineTo(W, oy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox, 0); ctx.lineTo(ox, H); ctx.stroke();

    /* Tick labels on real axis */
    ctx.font = "11px Georgia"; ctx.fillStyle = "#808098";
    ctx.textAlign = "center"; ctx.textBaseline = "top";
    const dp = Math.max(0, -Math.floor(Math.log10(step)));
    for (let v = Math.floor(wl/step)*step; v <= wr + step*0.5; v += step) {
        const sv = Math.round(v / step) * step;
        if (Math.abs(sv) < 1e-9) continue;
        const [sx] = w2s(sv, 0);
        if (sx < 10 || sx > W - 10) continue;
        ctx.fillText(Number.isInteger(sv) ? String(sv) : sv.toFixed(dp), sx, oy + 6);
    }

    /* Tick labels on imaginary axis */
    ctx.textAlign = "right"; ctx.textBaseline = "middle";
    for (let v = Math.floor(wb/step)*step; v <= wt + step*0.5; v += step) {
        const sv = Math.round(v / step) * step;
        if (Math.abs(sv) < 1e-9) continue;
        const [, sy] = w2s(0, sv);
        if (sy < 10 || sy > H - 10) continue;
        const lbl = (Number.isInteger(sv) ? String(sv) : sv.toFixed(dp)) + "i";
        ctx.fillText(lbl, ox - 6, sy);
    }

    /* Axis titles */
    ctx.font = "13px Georgia"; ctx.fillStyle = "#808098";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillText("Re", W - 24, oy + 6);
    ctx.textAlign = "left"; ctx.textBaseline = "middle";
    ctx.fillText("Im", ox + 8, 14);

    /* Unit circle (dashed) */
    ctx.strokeStyle = "rgba(192,132,252,0.35)"; ctx.lineWidth = 1.5;
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.arc(ox, oy, zoom, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    const ucLabelAngle = Math.PI / 6;
    const ucx = ox + zoom * Math.cos(ucLabelAngle);
    const ucy = oy - zoom * Math.sin(ucLabelAngle);
    ctx.font = "10px Georgia"; ctx.fillStyle = "rgba(192,132,252,0.5)";
    ctx.textAlign = "left"; ctx.textBaseline = "bottom";
    ctx.fillText("|z| = 1", ucx + 5, ucy - 3);

    /* Special complex points */
    COMPLEX_PTS.forEach(p => {
        const [sx, sy] = w2s(p.re, p.im);
        if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) return;
        ctx.fillStyle = COL.C;
        ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(sx, sy, 5, 0, Math.PI * 2); ctx.stroke();
        ctx.font = "12px Georgia"; ctx.fillStyle = COL.C;
        ctx.textAlign = "left"; ctx.textBaseline = "bottom";
        ctx.fillText(p.label, sx + 8, sy - 4);
    });

    /* Zoom indicator */
    ctx.font = "11px Georgia"; ctx.fillStyle = "#606078";
    ctx.textAlign = "right"; ctx.textBaseline = "top";
    ctx.fillText("Zoom: " + zoom.toFixed(zoom < 10 ? 1 : 0) + "x  [\u2102 plane]", W - 12, 12);
    ctx.textAlign = "left";
    ctx.fillText("Scroll to zoom \u00B7 Drag to pan", 12, 12);

    if (paused) {
        ctx.font = "14px Georgia"; ctx.fillStyle = GOLD;
        ctx.textAlign = "center"; ctx.textBaseline = "top";
        ctx.fillText("\u275A\u275A Paused", W/2, 12);
    }
}

/* ============================================================
   ANIMATED SEQUENCES
   ============================================================ */

/* Auto Tour: integers appear → zoom to rationals → zoom to irrationals */
function startAutoAnimate() {
    stopAllAnims();
    families.N = true; families.Z = false; families.Q = false; families.R = false; families.C = false;
    renderToggles(); renderCards(); renderProps();
    cx = 0; cy = 0; zoom = 40;
    autoAnim = { phase: 0, t: 0 };
    document.getElementById("btnAutoAnimate").classList.add("running");
}

function updateAutoAnim(dt) {
    if (!autoAnim) return;
    autoAnim.t += dt;

    switch (autoAnim.phase) {
        case 0: /* Naturals appearing one by one */
            if (autoAnim.t > 2.0) {
                autoAnim.phase = 1; autoAnim.t = 0;
                families.Z = true; renderToggles(); renderProps();
            }
            break;
        case 1: /* Show integers, pan left */
            cx = lerp(0, 120, easeInOut(Math.min(1, autoAnim.t / 1.5)));
            if (autoAnim.t > 2.0) {
                autoAnim.phase = 2; autoAnim.t = 0;
                families.Q = true; renderToggles(); renderProps();
            }
            break;
        case 2: /* Zoom into rationals */
            zoom = lerp(40, 140, easeInOut(Math.min(1, autoAnim.t / 2.5)));
            cx = lerp(120, -W/2 + W/2 - 1.5*zoom, easeInOut(Math.min(1, autoAnim.t / 2.5)));
            if (autoAnim.t > 3.0) {
                autoAnim.phase = 3; autoAnim.t = 0;
                families.R = true; renderToggles(); renderProps();
            }
            break;
        case 3: /* Zoom to irrationals */
            {
                const targetZoom = 200;
                const targetCx = W/2 - (W/2 + Math.PI * targetZoom);
                zoom = lerp(140, targetZoom, easeInOut(Math.min(1, autoAnim.t / 2.5)));
                cx = lerp(-W/2 + W/2 - 1.5*140, targetCx, easeInOut(Math.min(1, autoAnim.t / 2.5)));
            }
            if (autoAnim.t > 3.5) {
                autoAnim = null;
                document.getElementById("btnAutoAnimate").classList.remove("running");
            }
            break;
    }
}

/* Density zoom: pick two rationals and keep zooming in */
function startDensityZoom() {
    stopAllAnims();
    families.Q = true; families.N = true; renderToggles(); renderProps();
    densityAnim = { t: 0, centreA: 0.3, centreB: 0.7, startZoom: zoom, iteration: 0 };
    document.getElementById("btnDensity").classList.add("running");
}

function updateDensityAnim(dt) {
    if (!densityAnim) return;
    densityAnim.t += dt;

    const phaseDuration = 2.5;
    const phaseT = (densityAnim.t % phaseDuration) / phaseDuration;
    const eased = easeInOut(phaseT);

    /* Each iteration: zoom in on the midpoint, then pick new pair */
    if (densityAnim.t > phaseDuration) {
        densityAnim.t -= phaseDuration;
        densityAnim.iteration++;
        const mid = (densityAnim.centreA + densityAnim.centreB) / 2;
        const span = (densityAnim.centreB - densityAnim.centreA) / 3;
        densityAnim.centreA = mid - span;
        densityAnim.centreB = mid + span;
        densityAnim.startZoom = zoom;
        if (densityAnim.iteration > 8) {
            densityAnim = null;
            document.getElementById("btnDensity").classList.remove("running");
            return;
        }
    }

    const targetZoom = densityAnim.startZoom * 2.2;
    zoom = lerp(densityAnim.startZoom, targetZoom, eased);
    const mid = (densityAnim.centreA + densityAnim.centreB) / 2;
    cx = W/2 - (W/2 + mid * zoom);
}

/* Operation journey */
function startOperationJourney() {
    stopAllAnims();
    families.N = true; renderToggles(); renderProps();

    const startVal = parseFloat(document.getElementById("opStart").value) || 2;
    const amount = parseFloat(document.getElementById("opValue").value) || 3;
    const op = document.getElementById("opSelect").value;
    const endVal = op === "add" ? startVal + amount : startVal - amount;

    if (op === "sub" && endVal < 0) {
        families.Z = true; renderToggles(); renderProps();
    }

    /* Centre view on the range */
    const midVal = (startVal + endVal) / 2;
    const rangeVal = Math.abs(endVal - startVal);
    zoom = Math.min(120, Math.max(30, (W - 100) / (rangeVal + 4)));
    cx = W/2 - (W/2 + midVal * zoom);

    opAnim = { start: startVal, end: endVal, t: 0 };
    document.getElementById("btnOperation").classList.add("running");
}

function updateOpAnim(dt) {
    if (!opAnim) return;
    opAnim.t += dt * 0.4;
    if (opAnim.t >= 1) {
        opAnim.t = 1;
        /* Hold for a moment then clear */
        setTimeout(() => {
            opAnim = null;
            document.getElementById("btnOperation").classList.remove("running");
        }, 1500);
        /* Stop updating */
        opAnim.done = true;
    }
}

function stopAllAnims() {
    if (autoAnim) document.getElementById("btnAutoAnimate").classList.remove("running");
    if (densityAnim) document.getElementById("btnDensity").classList.remove("running");
    if (opAnim) document.getElementById("btnOperation").classList.remove("running");
    autoAnim = null; densityAnim = null; opAnim = null;
}

/* ============================================================
   UI RENDERING
   ============================================================ */
function renderToggles() {
    const el = document.getElementById("toggles");
    const labels = {
        N: "\u2115 Natural", Z: "\u2124 Integer", Q: "\u211A Rational",
        R: "\u211D Real", C: "\u2102 Complex"
    };
    let h = "";
    for (const k of ["N","Z","Q","R","C"])
        h += "<button class='toggle-btn" + (families[k] ? " active-" + k : "")
           + "' data-f='" + k + "'>" + labels[k] + "</button>";
    el.innerHTML = h;
    el.querySelectorAll(".toggle-btn").forEach(b => {
        b.addEventListener("click", () => {
            families[b.dataset.f] = !families[b.dataset.f];
            renderToggles(); renderCards(); renderProps();
        });
    });
}

function renderCards() {
    const el = document.getElementById("cards");
    let h = "";
    SPECIALS.forEach((s, i) => {
        const hide = s.complex && !families.C;
        h += "<div class='const-card" + (hide ? " hidden" : "") + "' data-i='" + i + "'>"
           + "<div class='symbol'>" + s.sym + "</div>"
           + "<div class='value'>" + s.approx + "</div>"
           + "<div class='desc'>" + s.desc + "</div></div>";
    });
    el.innerHTML = h;
    el.querySelectorAll(".const-card").forEach(cd => {
        cd.addEventListener("click", () => {
            const s = SPECIALS[parseInt(cd.dataset.i)];
            if (s.complex) {
                if (!families.C) { families.C = true; renderToggles(); renderCards(); renderProps(); }
                zoom = 80; cx = 0; cy = 0;
            } else {
                zoom = 80;
                cx = W/2 - (W/2 + s.val * zoom);
                cy = 0;
            }
        });
    });
}

function renderProps() {
    const active = ["N","Z","Q","R","C"].filter(k => families[k]);
    const key = active.length ? active[active.length - 1] : "N";
    const info = INFO[key];

    document.getElementById("pName").textContent = info.name;
    document.getElementById("pText").textContent = info.text;

    let tags = "";
    info.props.forEach(([label, cls]) => {
        tags += "<span class='prop-tag " + cls + "'>" + label + "</span>";
    });
    document.getElementById("pTags").innerHTML = tags;

    const chain = ["\u2115","\u2124","\u211A","\u211D","\u2102"];
    const keys  = ["N","Z","Q","R","C"];
    let hier = "";
    chain.forEach((s, i) => {
        hier += families[keys[i]] ? "<span class='hl'>" + s + "</span>" : s;
        if (i < chain.length - 1) hier += " \u2282 ";
    });
    document.getElementById("pHier").innerHTML = hier;

    renderInsight();
}

function renderInsight() {
    let txt;
    if (families.C) {
        txt = "The complex plane unifies algebra and geometry. Multiplication by i is a 90\u00B0 rotation. "
            + "Every polynomial equation has solutions here.";
    } else if (families.Q && zoom > 120) {
        txt = "No matter how far you zoom in, there are always more rationals between any two points. "
            + "Yet the rationals have \u2018measure zero\u2019 \u2014 almost every point on the line is irrational.";
    } else if (families.R) {
        txt = "The real line is complete \u2014 every convergent sequence has a limit, and every bounded set "
            + "has a supremum. Between the rationals lurk uncountably many irrationals: \u221A2, \u03C0, e, "
            + "and infinitely more.";
    } else {
        txt = "The number line is humanity\u2019s most fundamental mathematical construction. Starting with "
            + "counting (\u2115), each extension solves a new problem: subtraction needs \u2124, division "
            + "needs \u211A, limits need \u211D, and algebra needs \u2102.";
    }
    document.getElementById("iText").textContent = txt;
}

/* ============================================================
   INTERACTION  —  Mouse
   ============================================================ */
cvs.addEventListener("mousedown", e => {
    dragging = true;
    dragX = e.clientX; dragY = e.clientY;
    dragCX = cx; dragCY = cy;
});
window.addEventListener("mousemove", e => {
    if (!dragging) return;
    cx = dragCX + (e.clientX - dragX);
    if (families.C) cy = dragCY + (e.clientY - dragY);
});
window.addEventListener("mouseup", () => { dragging = false; });

cvs.addEventListener("wheel", e => {
    e.preventDefault();
    const rect = cvs.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (W / rect.width);
    const my = (e.clientY - rect.top) * (H / rect.height);
    const [wx, wy] = s2w(mx, my);
    const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    zoom = Math.max(0.5, Math.min(1000, zoom * factor));
    cx = mx - W/2 - wx * zoom;
    if (families.C) cy = my - H/2 + wy * zoom;
    renderInsight();
}, { passive: false });

/* ============================================================
   INTERACTION  —  Touch (pinch-to-zoom, drag-to-pan)
   ============================================================ */
let touches = [], lastPinchDist = 0;

cvs.addEventListener("touchstart", e => {
    e.preventDefault();
    touches = [...e.touches];
    if (touches.length === 1) {
        dragging = true;
        dragX = touches[0].clientX; dragY = touches[0].clientY;
        dragCX = cx; dragCY = cy;
    } else if (touches.length === 2) {
        lastPinchDist = Math.hypot(touches[1].clientX - touches[0].clientX,
                                    touches[1].clientY - touches[0].clientY);
    }
}, { passive: false });

cvs.addEventListener("touchmove", e => {
    e.preventDefault();
    const t = [...e.touches];
    if (t.length === 1 && dragging) {
        cx = dragCX + (t[0].clientX - dragX);
        if (families.C) cy = dragCY + (t[0].clientY - dragY);
    } else if (t.length === 2) {
        const dist = Math.hypot(t[1].clientX - t[0].clientX, t[1].clientY - t[0].clientY);
        if (lastPinchDist > 0) {
            const factor = dist / lastPinchDist;
            zoom = Math.max(0.5, Math.min(1000, zoom * factor));
        }
        lastPinchDist = dist;
    }
}, { passive: false });

cvs.addEventListener("touchend", e => {
    dragging = false; lastPinchDist = 0;
    touches = [...e.touches];
});

/* ============================================================
   BUTTON HANDLERS
   ============================================================ */
document.getElementById("btnAutoAnimate").addEventListener("click", () => {
    if (autoAnim) { stopAllAnims(); return; }
    startAutoAnimate();
});
document.getElementById("btnDensity").addEventListener("click", () => {
    if (densityAnim) { stopAllAnims(); return; }
    startDensityZoom();
});
document.getElementById("btnOperation").addEventListener("click", () => {
    if (opAnim) { stopAllAnims(); return; }
    startOperationJourney();
});
document.getElementById("btnPause").addEventListener("click", () => {
    paused = !paused;
    document.getElementById("btnPause").innerHTML = paused ? "&#9654; Play" : "&#10074;&#10074; Pause";
});

/* ============================================================
   ANIMATION LOOP
   ============================================================ */
let lastFrameTime = 0;

function frame(timestamp) {
    const dt = lastFrameTime ? Math.min((timestamp - lastFrameTime) / 1000, 0.1) : 0.016;
    lastFrameTime = timestamp;

    if (!paused) {
        globalTime += dt;
        if (autoAnim) updateAutoAnim(dt);
        if (densityAnim) updateDensityAnim(dt);
        if (opAnim && !opAnim.done) updateOpAnim(dt);
    }

    if (families.C) drawComplexPlane();
    else drawNumberLine();
    requestAnimationFrame(frame);
}

/* ---- Init ---- */
renderToggles(); renderCards(); renderProps();
requestAnimationFrame(frame);
</script>
